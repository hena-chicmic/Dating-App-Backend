<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dating App Chat Test (Socket.io)</title>
    <!-- Use Socket.io client library -->
    <script src="https://cdn.socket.io/4.7.4/socket.io.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f4f9; padding: 20px; color: #333; }
        .container { max-width: 600px; margin: 0 auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #ff4b2b; }
        #chat { border: 1px solid #ddd; height: 350px; overflow-y: auto; padding: 15px; background: #fafafa; border-radius: 5px; margin-bottom: 10px; }
        .message { margin-bottom: 10px; padding: 8px 12px; border-radius: 15px; max-width: 80%; }
        .sent { background-color: #ff4b2b; color: white; margin-left: auto; border-bottom-right-radius: 2px; }
        .received { background-color: #e0e0e0; margin-right: auto; border-bottom-left-radius: 2px; }
        .system { font-size: 0.8em; color: #888; text-align: center; font-style: italic; margin-bottom: 5px; }
        input, button { padding: 10px; border-radius: 5px; border: 1px solid #ddd; outline: none; }
        .input-group { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
        .chat-input { display: flex; gap: 10px; }
        .chat-input input { flex: 1; }
        button { background: #ff4b2b; color: white; border: none; cursor: pointer; transition: 0.3s; }
        button:hover { background: #ff416c; }
        .status { font-weight: bold; }
        .online { color: green; }
        .offline { color: red; }
    </style>
</head>
<body>

<div class="container">
    <h2>💬 Dating App Chat Test</h2>
    
    <div class="input-group">
        <input type="text" id="token" placeholder="Enter JWT Access Token">
        <input type="number" id="userId" placeholder="Enter your User ID">
        <input type="number" id="matchId" placeholder="Enter Match ID (Room)">
        <button onclick="connectSocket()">Connect & Join Room</button>
    </div>

    <div id="connectionStatus" class="status offline">Status: Disconnected</div>
    <div id="onlineMatches" style="font-size: 0.9em; margin-bottom: 10px;">Online Matches: None</div>

    <hr>

    <div id="chat"></div>

    <div class="chat-input">
        <input type="text" id="message" placeholder="Type a message..." onkeypress="handleKeyPress(event)">
        <button onclick="sendMessage()">Send</button>
    </div>
</div>

<script>
    let socket;

    function connectSocket() {
        const token = document.getElementById("token").value;
        const userId = document.getElementById("userId").value;
        const matchId = document.getElementById("matchId").value;

        if (!token || !userId || !matchId) {
            alert("Please provide Token, User ID, and Match ID");
            return;
        }

        // Connect to Socket.io server on port 3000 (default for server.js)
        socket = io("http://localhost:3000", {
            auth: { token: token }
        });

        socket.on("connect", () => {
            document.getElementById("connectionStatus").innerText = "Status: Connected (Socket ID: " + socket.id + ")";
            document.getElementById("connectionStatus").className = "status online";
            logSystem("✅ Successfully connected to server");

            // 1. Tell server we are online (presence)
            socket.emit("user_online", userId);

            // 2. Join the match room
            socket.emit("join_match_room", { matchId: matchId });
            logSystem("📢 Joined room: match_" + matchId);
        });

        socket.on("connect_error", (err) => {
            logSystem("❌ Connection error: " + err.message);
        });

        socket.on("receive_message", (data) => {
            const isMe = data.sender_id == userId;
            logMessage(data.message_text, isMe ? "sent" : "received", isMe ? "You" : data.sender_username || "Match");
        });

        socket.on("new_match", (data) => {
            logSystem("🔥 IT'S A MATCH! New match with user: " + data.matchedWith);
        });

        socket.on("online_status", (data) => {
            document.getElementById("onlineMatches").innerText = "Online Matches (IDs): " + (data.onlineUsers.join(", ") || "None");
        });

        socket.on("friend_online", (data) => {
            logSystem("👤 User " + data.userId + " just came online");
        });

        socket.on("friend_offline", (data) => {
            logSystem("👤 User " + data.userId + " went offline");
        });

        socket.on("disconnect", () => {
            document.getElementById("connectionStatus").innerText = "Status: Disconnected";
            document.getElementById("connectionStatus").className = "status offline";
            logSystem("❌ Disconnected from server");
        });

        socket.on("error", (err) => {
            logSystem("⚠️ Error: " + err.message);
        });
    }

    function sendMessage() {
        const text = document.getElementById("message").value;
        const matchId = document.getElementById("matchId").value;

        if (socket && socket.connected && text) {
            socket.emit("send_message", {
                matchId: matchId,
                text: text
            });
            document.getElementById("message").value = "";
        }
    }

    function handleKeyPress(e) {
        if (e.key === 'Enter') sendMessage();
    }

    function logMessage(text, type, sender) {
        const chat = document.getElementById("chat");
        const div = document.createElement("div");
        div.className = "message " + type;
        div.innerHTML = `<strong>${sender}:</strong> ${text}`;
        chat.appendChild(div);
        chat.scrollTop = chat.scrollHeight;
    }

    function logSystem(msg) {
        const chat = document.getElementById("chat");
        const div = document.createElement("div");
        div.className = "system";
        div.innerText = msg;
        chat.appendChild(div);
        chat.scrollTop = chat.scrollHeight;
    }
</script>

</body>
</html>
